name: smart_finance
description: A premium production-quality Smart Finance Flutter application with SMS auto-read, AI insights, budgeting, and OCR receipt scanner.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation & State Management
  go_router: ^14.2.0
  flutter_riverpod: ^2.5.1

  # Firebase Services
  firebase_core: ^3.2.0
  firebase_auth: ^5.1.1
  cloud_firestore: ^5.0.2
  firebase_storage: ^12.0.1

  # Local DB & Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3

  # Network
  dio: ^5.5.0+1

  # Charts & UI
  fl_chart: ^0.68.0
  intl: ^0.19.0
  shimmer: ^3.0.0

  # Hardware/Platform Integration
  image_picker: ^1.1.2
  google_mlkit_text_recognition: ^0.13.0
  permission_handler: ^11.3.1
  flutter_sms_inbox: ^1.0.5
  local_auth: ^2.2.0
  flutter_local_notifications: ^17.2.1+2

  # Utilities & Helpers
  share_plus: ^9.0.0
  pdf: ^3.10.8
  csv: ^6.0.0
  excel: ^4.0.6
  crypto: ^3.0.3
  google_generative_ai: ^0.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
