name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Allows you to manually trigger the build from GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Restore dependencies
        run: flutter pub get

      - name: Build Debug APK (Signed with dev-key, recommended for testing)
        run: flutter build apk --debug

      - name: Build Release APK (Production build)
        run: flutter build apk --release

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartFinance-Debug-APK
          path: build/app/outputs/flutter-apk/app-debug.apk

      - name: Upload Release APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartFinance-Release-APK
          path: build/app/outputs/flutter-apk/app-release.apk
